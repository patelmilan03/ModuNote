name: modunote
description: A quick-capture ideation app for content creators and people who prefer speaking over typing for journalling.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local database
  drift: ^2.18.0
  drift_flutter: ^0.2.1

  # Rich text editor
  flutter_quill: ^10.8.5

  # Navigation
  go_router: ^14.2.0
  flutter_floating_bottom_bar: ^2.0.0

  # Audio
  speech_to_text: ^7.0.0
  flutter_sound: ^9.2.13

  # Fonts
  google_fonts: ^6.2.1

  # Firebase (Phase 10 extension — live sync. Run `flutterfire configure` before building)
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.0.0
  google_sign_in: 6.2.1

  # Remote API
  http: ^1.2.0

  # Utilities
  uuid: ^4.4.0
  path_provider: ^2.1.3
  path: ^1.9.0
  equatable: ^2.0.5
  shared_preferences: ^2.3.0
  toastification: ^3.2.0
  skeletonizer: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.11
  drift_dev: ^2.18.0

  # Linting
  flutter_lints: ^4.0.0
  custom_lint: ^0.7.6
  riverpod_lint: ^2.4.0
  mocktail: ^1.0.5

  # Testing — in-memory Drift needs a host sqlite3 lib (no system one on
  # Windows); the test bootstrap downloads the official sqlite3.dll once.
  sqlite3: ^2.4.0
  archive: ^3.6.1

dependency_overrides:
  intl: '>=0.19.0 <0.21.0'

flutter:
  uses-material-design: true
